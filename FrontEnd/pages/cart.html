<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart - Aurum</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body class="fade-in">
  <header>
    <a href="/" class="logo">Aurum</a>
    <nav>
      <form class="search-bar" action="/pages/shop.html" method="GET">
        <input type="text" name="q" placeholder="Search products..." required>
        <button type="submit" style="background:transparent; border:none; color:var(--gold); cursor:pointer;">&#x1F50D;</button>
      </form>
      <a href="/pages/shop.html">Shop</a>
      <a href="/pages/cart.html">Cart (<span id="cart-count" style="display:none;">0</span>)</a>
      <a href="/pages/login.html" class="guest-link">Login</a>
      <a href="/pages/dashboard.html" class="auth-link">Dashboard</a>
      <a href="#" id="logout-btn" class="auth-link">Logout</a>
    </nav>
  </header>
  
  <main>
    <h1>Your Cart</h1>
    <div class="cart-layout" id="cart-container">
      <div class="cart-items" id="cart-items-list">
        <!-- items injected here -->
      </div>
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <p style="display:flex; justify-content:space-between; margin-top:1rem; font-size:1.25rem;">
          <span>Total:</span>
          <span id="cart-total">₹0.00</span>
        </p>
        <a href="/pages/checkout.html" class="btn btn-primary" style="width:100%; margin-top:1.5rem;">Proceed to Checkout</a>
      </div>
    </div>
  </main>
  
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/cart_page.js"></script>
</body>
</html>
