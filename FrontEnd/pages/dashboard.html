<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Aurum</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .order-card {
      background: var(--gray-light);
      padding: 1.5rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray-mid);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body class="fade-in">
  <header>
    <a href="/" class="logo">Aurum</a>
    <nav>
      <form class="search-bar" action="/pages/shop.html" method="GET">
        <input type="text" name="q" placeholder="Search products..." required>
        <button type="submit" style="background:transparent; border:none; color:var(--gold); cursor:pointer;">&#x1F50D;</button>
      </form>
      <a href="/pages/shop.html">Shop</a>
      <a href="/pages/cart.html">Cart (<span id="cart-count" style="display:none;">0</span>)</a>
      <a href="/pages/dashboard.html" class="auth-link">Dashboard</a>
      <a href="#" id="logout-btn" class="auth-link">Logout</a>
    </nav>
  </header>
  
  <main>
    <h1>My Dashboard</h1>
    <p>Welcome back, <span id="user-email"></span>!</p>
    <div id="admin-link" style="display:none; margin-top: 1rem;">
      <a href="/pages/admin.html" class="btn btn-outline">Go to Admin Panel</a>
    </div>
    
    <h2 style="margin-top: 3rem;">Order History</h2>
    <div id="orders-list"></div>
  </main>
  
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    async function loadDashboard() {
      try {
        ui.showLoader();
        const user = await api.getMe();
        document.getElementById('user-email').textContent = user.email;
        if (user.is_admin) {
          document.getElementById('admin-link').style.display = 'block';
        }
        
        const orders = await api.getOrders();
        const list = document.getElementById('orders-list');
        if (orders.length === 0) {
          list.innerHTML = '<p>You have no orders yet.</p>';
          return;
        }
        
        orders.forEach(o => {
          const card = document.createElement('div');
          card.className = 'order-card';
          card.innerHTML = `
            <div class="order-header">
              <div>
                <strong>Order #${o.id}</strong><br>
                <span style="color:var(--gray-text)">${new Date(o.created_at).toLocaleDateString()}</span>
              </div>
              <div style="text-align:right">
                <strong>Status:</strong> ${o.status.toUpperCase()}<br>
                <strong>Total:</strong> ₹${o.total_amount.toFixed(2)}
              </div>
            </div>
            <div>
              <p>Items: ${o.items.length}</p>
            </div>
          `;
          list.appendChild(card);
        });
      } catch (err) {
        if (err.message.includes('401')) {
          window.location.href = '/pages/login.html';
        }
      } finally {
        ui.hideLoader();
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => loadDashboard());
  </script>
</body>
</html>
