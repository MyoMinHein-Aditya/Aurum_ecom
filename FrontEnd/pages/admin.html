<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin - Aurum</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }
    .stat-card {
      background: var(--gold-light);
      padding: 2rem;
      border-radius: 8px;
      text-align: center;
    }
    .stat-card h3 { font-size: 1rem; color: var(--black); }
    .stat-card p { font-size: 2rem; font-weight: 700; color: var(--gold); margin:0; }
  </style>
</head>
<body class="fade-in">
  <header>
    <a href="/" class="logo">Aurum Admin</a>
    <nav>
      <a href="/pages/dashboard.html">Back to Site</a>
      <a href="#" id="logout-btn">Logout</a>
    </nav>
  </header>
  
  <main>
    <h1>Dashboard Overview</h1>
    <div class="stats-grid" id="stats-grid">
      <!-- Injected stats -->
    </div>
    
    <div style="max-width: 800px; margin-bottom: 4rem;">
      <canvas id="salesChart"></canvas>
    </div>
    
    <div style="max-width: 800px; margin-bottom: 4rem; background: var(--gray-light); padding: 2rem; border-radius: 8px;">
      <h2>Add New Product</h2>
      <form id="add-product-form">
        <div class="form-group">
          <label>Product Name</label>
          <input type="text" id="prod-name" required>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="prod-desc" rows="3" required></textarea>
        </div>
        <div style="display:flex; gap:1rem;">
          <div class="form-group" style="flex:1;">
            <label>Price (₹)</label>
            <input type="number" id="prod-price" step="0.01" min="0.01" required>
          </div>
          <div class="form-group" style="flex:1;">
            <label>Quantity in Stock</label>
            <input type="number" id="prod-stock" min="0" required>
          </div>
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="prod-category" required>
        </div>
        <div class="form-group">
          <label>Image URL (Optional)</label>
          <input type="url" id="prod-image">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Add Product</button>
      </form>
    </div>

    <!-- Admin Products Management -->
    <div style="margin-bottom: 4rem;">
      <h2>Manage Products</h2>
      <div style="overflow-x: auto;">
        <table style="width:100%; text-align:left; border-collapse: collapse; margin-top:1rem;">
          <thead>
            <tr style="border-bottom: 2px solid var(--gold);">
              <th style="padding: 1rem;">ID</th>
              <th style="padding: 1rem;">Name</th>
              <th style="padding: 1rem;">Price</th>
              <th style="padding: 1rem;">Stock</th>
              <th style="padding: 1rem;">Action</th>
            </tr>
          </thead>
          <tbody id="admin-products-table">
          </tbody>
        </table>
      </div>
    </div>

    <!-- Admin Orders Management -->
    <div style="margin-bottom: 4rem;">
      <h2>Manage Orders</h2>
      <div style="overflow-x: auto;">
        <table style="width:100%; text-align:left; border-collapse: collapse; margin-top:1rem;">
          <thead>
            <tr style="border-bottom: 2px solid var(--gold);">
              <th style="padding: 1rem;">Order ID</th>
              <th style="padding: 1rem;">Date</th>
              <th style="padding: 1rem;">Total</th>
              <th style="padding: 1rem;">Status</th>
              <th style="padding: 1rem;">Action</th>
            </tr>
          </thead>
          <tbody id="admin-orders-table">
          </tbody>
        </table>
      </div>
    </div>
    
  </main>
  
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    async function loadAdmin() {
      try {
        ui.showLoader();
        const stats = await api.getDashboard();
        
        document.getElementById('stats-grid').innerHTML = `
          <div class="stat-card">
            <h3>Total Revenue</h3>
            <p style="color:var(--black)">₹${stats.total_revenue.toFixed(2)}</p>
          </div>
          <div class="stat-card">
            <h3>Orders Today</h3>
            <p style="color:var(--black)">${stats.orders_today}</p>
          </div>
          <div class="stat-card">
            <h3>New Users</h3>
            <p style="color:var(--black)">${stats.new_users}</p>
          </div>
          <div class="stat-card">
            <h3>Low Stock</h3>
            <p style="color:var(--black)">${stats.low_stock_count}</p>
          </div>
        `;
        
        const labels = stats.weekly_sales.map(s => s.date).reverse();
        const data = stats.weekly_sales.map(s => s.amount).reverse();
        
        const ctx = document.getElementById('salesChart').getContext('2d');
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Sales (last 7 days)',
              data: data,
              backgroundColor: '#C9A84C'
            }]
          }
        });
        
        await loadAdminProducts();
        await loadAdminOrders();
        
      } catch (err) {
        if (err.message.includes('401') || err.message.includes('403') || err.message.includes('404')) {
          ui.showToast('Unauthorized', 'error');
          setTimeout(() => window.location.href = '/', 1500);
        } else {
          ui.showToast('Failed to load dashboard stats', 'error');
        }
      } finally {
        ui.hideLoader();
      }
    }
    
    async function loadAdminProducts() {
      const products = await api.getProducts();
      const tbody = document.getElementById('admin-products-table');
      tbody.innerHTML = products.map(p => `
        <tr style="border-bottom: 1px solid var(--gray-mid);">
          <td style="padding: 1rem;">${p.id}</td>
          <td style="padding: 1rem;">${p.name}</td>
          <td style="padding: 1rem;">₹${p.price.toFixed(2)}</td>
          <td style="padding: 1rem;">${p.stock}</td>
          <td style="padding: 1rem;">
            <button class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size:0.875rem;" onclick="deleteProduct(${p.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    }
    
    async function deleteProduct(id) {
      if(!confirm('Are you sure you want to delete this product?')) return;
      try {
        ui.showLoader();
        await api.deleteProduct(id);
        ui.showToast('Product deleted');
        await loadAdminProducts();
      } catch(err) {
        ui.showToast(err.message, 'error');
      } finally {
        ui.hideLoader();
      }
    }
    
    async function loadAdminOrders() {
      const orders = await api.getAllOrdersAdmin();
      const tbody = document.getElementById('admin-orders-table');
      tbody.innerHTML = orders.map(o => `
        <tr style="border-bottom: 1px solid var(--gray-mid);">
          <td style="padding: 1rem;">#${o.id}</td>
          <td style="padding: 1rem;">${new Date(o.created_at).toLocaleDateString()}</td>
          <td style="padding: 1rem;">₹${o.total_amount.toFixed(2)}</td>
          <td style="padding: 1rem;">
            <span style="padding:0.25rem 0.5rem; background: ${o.status==='delivered'?'#d4edda':'#fff3cd'}; color: ${o.status==='delivered'?'#155724':'#856404'}; border-radius:4px; font-size:0.875rem;">
              ${o.status.toUpperCase()}
            </span>
          </td>
          <td style="padding: 1rem;">
            ${o.status !== 'delivered' ? `<button class="btn btn-primary" style="padding: 0.25rem 0.5rem; font-size:0.875rem;" onclick="shipOrder(${o.id})">Ship</button>` : ''}
          </td>
        </tr>
      `).join('');
    }
    
    async function shipOrder(id) {
      try {
        ui.showLoader();
        await api.updateOrderStatus(id, 'delivered');
        ui.showToast('Order marked as delivered!');
        await loadAdminOrders();
      } catch(err) {
        ui.showToast(err.message, 'error');
      } finally {
        ui.hideLoader();
      }
    }
    
    document.getElementById('add-product-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const productData = {
        name: document.getElementById('prod-name').value,
        description: document.getElementById('prod-desc').value,
        price: parseFloat(document.getElementById('prod-price').value),
        stock: parseInt(document.getElementById('prod-stock').value, 10),
        category: document.getElementById('prod-category').value,
        image_url: document.getElementById('prod-image').value || null
      };
      
      try {
        ui.showLoader();
        await api.createProduct(productData);
        ui.showToast('Product added successfully!');
        e.target.reset();
        await loadAdminProducts();
      } catch (err) {
        ui.showToast(err.message, 'error');
      } finally {
        ui.hideLoader();
      }
    });
    
    document.addEventListener('DOMContentLoaded', loadAdmin);
  </script>
</body>
</html>
